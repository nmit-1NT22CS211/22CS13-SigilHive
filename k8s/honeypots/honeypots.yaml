# ─────────────────────────────────────────────────────────────────────────────
#  SigilHive — Honeypot Deployments + LoadBalancer Services + Attacker Job
#
#  IMAGE_REGISTRY and IMAGE_TAG are placeholder strings replaced by CI via sed
#  before kubectl apply.
#
#  Exposed ports (external LoadBalancers):
#    5555  → SSH  honeypot
#    8080  → HTTP honeypot
#    2225  → MySQL/DB honeypot
# ─────────────────────────────────────────────────────────────────────────────

##############################################################################
# SSH HONEYPOT
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-honeypot
  namespace: sigilhive
  labels:
    app: ssh-honeypot
    component: honeypot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-honeypot
  template:
    metadata:
      labels:
        app: ssh-honeypot
    spec:
      # Wait for Kafka before starting — avoids startup race condition
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka-svc 9092; do
                echo "waiting for kafka-svc:9092..."
                sleep 3
              done
              echo "Kafka is up!"
      containers:
        - name: ssh-honeypot
          # Built from SigilHive/ssh_server/Dockerfile
          # Context = SigilHive/ so kafka_manager.py, file_structure.py, rl_core/ are available
          image: IMAGE_REGISTRY/ssh_honeypot:IMAGE_TAG
          ports:
            - containerPort: 5555
              name: ssh
          env:
            - name: PORT
              value: "5555"
            - name: KAFKA_BROKER
              value: "kafka-svc:9092"
            - name: RL_ENABLED
              value: "true"
          # All .env values (GEMINI_API_KEY, Grafana creds, SSH creds, etc.)
          envFrom:
            - secretRef:
                name: sigilhive-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: ssh-cache
              mountPath: /app/cache
      volumes:
        - name: ssh-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-honeypot-svc
  namespace: sigilhive
  labels:
    app: ssh-honeypot
  annotations:
    # L4 Network LB — preserves raw TCP, required for SSH and MySQL
    networking.gke.io/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app: ssh-honeypot
  ports:
    - name: ssh
      port: 5555
      targetPort: 5555
      protocol: TCP


